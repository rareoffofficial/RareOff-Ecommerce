services:

  postgres:
    image: postgres:16-alpine
    container_name: rareoff-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-rareoff}
      POSTGRES_USER: ${DB_USER:-rareoff}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rareoff_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - rareoff_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rareoff} -d ${DB_NAME:-rareoff}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rareoff-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@rareoff.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  rareoff_pg_data:
