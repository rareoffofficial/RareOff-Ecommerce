# ============================================================
# BASE CONFIG (shared across all profiles)
# Profile-specific overrides live in application-{profile}.yml
# Activate a profile via SPRING_PROFILES_ACTIVE env var.
# ============================================================

spring:
  application:
    name: rareoff-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ---------- Datasource (env-driven; never hardcode creds) ----------
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:rareoff}
    username: ${DB_USER:rareoff}
    password: ${DB_PASSWORD:rareoff_dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: RareoffHikariCP
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ---------- JPA / Hibernate ----------
  jpa:
    open-in-view: false         # ALWAYS false in production (prevents lazy-load leaks)
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: true

  # ---------- Flyway (versioned DB migrations) ----------
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ---------- JSON ----------
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

# ---------- Server ----------
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never   # never leak stacktraces to clients
    include-exception: false

# ---------- Actuator (health, info, metrics) ----------
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

# ---------- OpenAPI / Swagger ----------
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ---------- App-level config (custom namespace) ----------
rareoff:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  security:
    jwt:
      secret: ${JWT_SECRET:change_me_in_env_file_min_32_characters_long}
      access-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:15}
      refresh-ttl-days: ${JWT_REFRESH_TOKEN_TTL_DAYS:14}
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
    public-base-url: ${PUBLIC_BASE_URL:http://localhost:8080}
  pricing:
    shipping-fee: ${SHIPPING_FEE:99}
    free-shipping-over: ${FREE_SHIPPING_OVER:5000}
    tax-rate: ${TAX_RATE:0.05}
  payment:
    razorpay:
      key-id: ${RAZORPAY_KEY_ID:}
      key-secret: ${RAZORPAY_KEY_SECRET:}
      webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}
      currency: ${RAZORPAY_CURRENCY:INR}

spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 20MB
