# Production overrides. Minimal logs, no SQL echo, strict.
spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  devtools:
    restart:
      enabled: false

server:
  error:
    include-message: never
    include-binding-errors: never

logging:
  level:
    root: WARN
    com.rareoff: INFO
  pattern:
    console: '{"ts":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%p","logger":"%c","msg":"%m","traceId":"%X{traceId:-}","reqId":"%X{requestId:-}"}%n'
